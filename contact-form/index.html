<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyrillus Mariae C. Poon</title>
<link rel="stylesheet" href="https://cyrillusmariae.github.io/contact-form/styles.css">
</head>
<body>
<div class="container">
  <h2>Cyrillus Mariae C. Poon</h2>
  <form id="contactForm" action="/contact-form/sendEmail.php" method="POST">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="4" required></textarea>

    <button type="submit">Send Message</button>
  </form>
  <p id="statusMessage"></p>
</div>

<script src="/contact-form/script.js"></script>
</body>
</html>
