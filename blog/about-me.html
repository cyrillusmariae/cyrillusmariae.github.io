<h1 class="auto-style18">關於我</h1>
<hr />
	
<p class="auto-style19">潘朗希弟兄，字諾仁，聖名瑪利亞濟利祿，聖伯多祿在俗兄弟會成員，祖籍廣東東莞，農曆癸未歲次五月十五日公曆天主降生二千零三年六月十四日生於香港。

</p>
<p><span class="auto-style19">空餘時喜愛寫作，以文會友，文章主題大多數環繞著潘弟兄個人生活中的一點一滴，以及潘弟兄對於一些事情的個人想法和感受</span>。</p>
