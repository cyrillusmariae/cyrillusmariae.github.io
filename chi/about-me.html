<h1 class="auto-style37">個人簡介</h1>
<hr />
<p class="auto-style39">
<img alt="" height="250" src="/chi/chavez.JPG" /></p>
<p class="auto-style37">潘朗希弟兄，字「諾仁」，聖名「瑪利亞濟利祿」，聖伯多祿在俗兄弟會成員，祖籍廣東東莞，農曆癸未歲次五月十五日公曆天主降生二千零三年六月十四日生於香港。</p>
<p class="auto-style37">空餘時喜愛寫作，以文會友，文章主題大多數環繞著潘弟兄個人生活中的一點一滴，以及潘弟兄對於一些事情的個人想法和感受。</p>
<hr />
<p class="auto-style38"><strong>怎樣稱呼和介紹我？</strong></p>
<p class="auto-style37">可以直接稱呼我的本名「朗希」或我的表字「諾仁」，如果想比較親切簡單地可以直接稱呼我「阿希」，我會欣然接受。</p>
