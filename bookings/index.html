<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyrillus Mariae C. Poon</title>
    <link rel="stylesheet" href="/bookings/styles.css">
</head>
<body>

<div class="container">
    <h2>Book an Appointment</h2>
    <form id="appointmentForm">
        <div class="form-group">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="phone">Your Phone:</label>
            <input type="tel" id="phone" name="phone" required>
        </div>
        <div class="form-group">
            <label for="datetime">Appointment Date and Time:</label>
            <input type="datetime-local" id="datetime" name="datetime" required>
        </div>
        <div class="form-group">
            <label for="service">Select Service:</label>
            <select id="service" name="service" required>
                <option value="">Select a service</option>
                <option value="consultation">Consultation</option>
                <option value="check-up">Health Check-up</option>
                <option value="therapy">Therapy Session</option>
            </select>
        </div>
        <input type="submit" value="Book Appointment">
    </form>
</div>

<script src="/bookings/script.js"></script>

</body>
</html>
